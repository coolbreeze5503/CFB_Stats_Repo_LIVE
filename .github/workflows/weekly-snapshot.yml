name: Weekly Stats Snapshot

on:
  schedule:
    - cron: "0 12 * 8-12,1 2"
  workflow_dispatch:
    inputs:
      year:
        description: "Season year to snapshot (leave blank for current)"
        required: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/snapshot.js
        env:
          CFBD_API_KEY: ${{ secrets.CFBD_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SNAPSHOT_YEAR: ${{ inputs.year }}
