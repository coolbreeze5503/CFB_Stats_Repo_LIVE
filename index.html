<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SnapCount — College Football Stats</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #0b0f0e;
    color: #e9e9e4;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 32px 20px 60px; }

  .eyebrow {
    display: flex; align-items: center; gap: 6px;
    color: #4e9973; font-size: 11px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 10px;
  }
  h1 {
    font-size: 34px; font-weight: 800; letter-spacing: -0.02em;
    margin: 0 0 6px;
  }
  h1 span { color: #d8a73d; }
  .subhead { color: #8a938e; font-size: 14px; margin: 0 0 28px; line-height: 1.5; }

  .card {
    background: #12100f10;
    background: #141a18;
    border: 1px solid #232a27;
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 20px;
  }

  label {
    display: block; font-size: 11px; font-weight: 700; color: #7d8783;
    text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px;
  }
  input[type="text"], input[type="number"] {
    width: 100%; background: #0b0f0e; border: 1px solid #2a322e;
    color: #e9e9e4; border-radius: 8px; padding: 10px 12px; font-size: 14px;
    outline: none;
  }
  input:focus { border-color: #4e9973; }

  .row { display: flex; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
  .row > div { flex: 1; min-width: 130px; }

  .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .tab {
    flex: 1; text-align: center; padding: 9px 0; border-radius: 8px;
    font-size: 13px; font-weight: 700; letter-spacing: 0.03em;
    background: #1c2320; color: #8a938e; border: none; cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .tab.active { background: #d8a73d; color: #0b0f0e; }

  button.primary {
    display: inline-flex; align-items: center; gap: 8px;
    background: #2f6b4f; color: #eef7f1; border: none;
    padding: 10px 18px; border-radius: 8px; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: background 0.15s;
  }
  button.primary:hover { background: #37805d; }
  button.primary:disabled { opacity: 0.5; cursor: default; }

  .status { font-size: 13px; color: #8a938e; margin-top: 10px; }
  .error {
    background: #2a1414; border: 1px solid #4a2020; color: #e29a9a;
    border-radius: 10px; padding: 12px 14px; font-size: 13px; margin-bottom: 20px;
    line-height: 1.5;
  }

  .section-label {
    font-size: 11px; font-weight: 700; color: #7d8783;
    text-transform: uppercase; letter-spacing: 0.08em; margin: 28px 0 10px;
  }

  .player-row {
    display: flex; justify-content: space-between; align-items: center;
    background: #141a18; border: 1px solid #232a27; border-radius: 10px;
    padding: 12px 14px; margin-bottom: 8px; cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .player-row:hover { border-color: #3a453f; }
  .player-row.selected { border-color: #d8a73d; background: #d8a73d0f; }
  .player-name { font-weight: 700; font-size: 14px; }
  .player-sub {
    font-family: ui-monospace, SFMono-Regular, monospace; font-size: 11px;
    color: #7d8783; margin-top: 3px;
  }
  .ppa-badge { text-align: right; font-family: ui-monospace, monospace; }
  .ppa-val { color: #4e9973; font-size: 14px; font-weight: 700; }
  .ppa-lbl { font-size: 9px; color: #7d8783; text-transform: uppercase; }

  .tape-title { text-align: center; font-size: 11px; font-weight: 700;
    color: #7d8783; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 18px; }
  .tape-names { display: flex; justify-content: space-between; margin-bottom: 18px; }
  .tape-names .a { color: #4e9973; font-weight: 800; font-size: 16px; }
  .tape-names .b { color: #d8a73d; font-weight: 800; font-size: 16px; }
  .stat-row { margin-bottom: 12px; }
  .stat-labels {
    display: flex; justify-content: space-between; font-family: ui-monospace, monospace;
    font-size: 12px; color: #b7bdb9; margin-bottom: 4px;
  }
  .stat-labels .mid { color: #7d8783; text-transform: uppercase; letter-spacing: 0.05em; }
  .bar-track { display: flex; gap: 2px; height: 7px; }
  .bar-half { flex: 1; background: #1c2320; overflow: hidden; }
  .bar-half.left { border-radius: 4px 0 0 4px; display: flex; justify-content: flex-end; }
  .bar-half.right { border-radius: 0 4px 4px 0; }
  .bar-fill { height: 100%; }
  .bar-fill.a { background: #4e9973; }
  .bar-fill.b { background: #d8a73d; }

  .footnote { text-align: center; font-size: 11px; color: #5c645f; margin-top: 18px; line-height: 1.5; }
  .empty { text-align: center; color: #5c645f; font-size: 13px; padding: 40px 0; }

  .spinner {
    display: inline-block; width: 14px; height: 14px; border: 2px solid #eef7f1;
    border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">● live via your own data pipeline</div>
  <h1>Snap<span>Count</span></h1>
  <p class="subhead">Real season stats, stacked side by side. Pick a team, pull two players, see who actually wins the matchup.</p>

  <div class="card">
    <div class="row">
      <div>
        <label>Year</label>
        <input type="text" id="year" value="2025" />
      </div>
      <div style="flex:2">
        <label>Team</label>
        <input type="text" id="team" value="Georgia" placeholder="e.g. Ohio State" />
      </div>
    </div>
    <div class="tabs" id="tabs">
      <button class="tab active" data-cat="passing" data-key="QB">QB</button>
      <button class="tab" data-cat="rushing" data-key="RB">RB</button>
      <button class="tab" data-cat="receiving" data-key="WR">WR</button>
    </div>
    <button class="primary" id="loadBtn">Load Roster Stats</button>
    <div class="status" id="status"></div>
  </div>

  <div id="errorBox"></div>
  <div id="rosterSection"></div>
  <div id="tapeSection"></div>
  <div id="emptyState" class="empty">Set a team and position above, then load stats to get started.</div>
</div>

<script>
  const state = { position: { cat: "passing", key: "QB", label: "Quarterbacks" }, players: [], selected: [] };

  const catLabels = { passing: "Quarterbacks", rushing: "Running Backs", receiving: "Receivers" };

  document.querySelectorAll(".tab").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      state.position = { cat: btn.dataset.cat, key: btn.dataset.key, label: catLabels[btn.dataset.cat] };
    });
  });

  function titleCase(s) {
    return s.toLowerCase().split(" ").map(w => w ? w[0].toUpperCase() + w.slice(1) : w).join(" ");
  }

  async function loadData() {
    const year = document.getElementById("year").value.trim();
    const team = document.getElementById("team").value.trim();
    const errorBox = document.getElementById("errorBox");
    const status = document.getElementById("status");
    const loadBtn = document.getElementById("loadBtn");
    const empty = document.getElementById("emptyState");

    errorBox.innerHTML = "";
    document.getElementById("rosterSection").innerHTML = "";
    document.getElementById("tapeSection").innerHTML = "";
    state.players = [];
    state.selected = [];

    if (!team || !year) {
      errorBox.innerHTML = '<div class="error">Enter a year and team first.</div>';
      return;
    }

    loadBtn.disabled = true;
    loadBtn.innerHTML = '<span class="spinner"></span> Loading...';
    status.textContent = "";
    empty.style.display = "none";

    try {
      const [statsRes, ppaRes] = await Promise.all([
        fetch(`/api/stats?year=${encodeURIComponent(year)}&team=${encodeURIComponent(team)}&endpoint=stats`),
        fetch(`/api/stats?year=${encodeURIComponent(year)}&team=${encodeURIComponent(team)}&endpoint=ppa`)
      ]);

      if (!statsRes.ok) throw new Error(`Request failed (${statsRes.status}). Check the team spelling.`);

      const statsJson = await statsRes.json();
      const ppaJson = ppaRes.ok ? await ppaRes.json() : [];

      const filtered = statsJson.filter(r => r.category === state.position.cat);
      if (filtered.length === 0) {
        errorBox.innerHTML = `<div class="error">No ${state.position.label.toLowerCase()} stats found for "${team}" in ${year}. Try the full team name (e.g. "Ohio State").</div>`;
        loadBtn.disabled = false;
        loadBtn.textContent = "Load Roster Stats";
        return;
      }

      const grouped = {};
      for (const row of filtered) {
        if (!grouped[row.player]) grouped[row.player] = { player: row.player, team: row.team, stats: {} };
        grouped[row.player].stats[row.statType] = row.stat;
      }
      for (const name of Object.keys(grouped)) {
        const match = ppaJson.find(p => p.name && p.name.toLowerCase().trim() === name.toLowerCase().trim());
        if (match && match.averagePPA) grouped[name].ppa = match.averagePPA.all;
      }

      state.players = Object.values(grouped).sort((a, b) => (b.stats.YDS || 0) - (a.stats.YDS || 0));
      renderRoster();
    } catch (e) {
      errorBox.innerHTML = `<div class="error">Couldn't load data — ${e.message}</div>`;
    } finally {
      loadBtn.disabled = false;
      loadBtn.textContent = "Load Roster Stats";
    }
  }

  function renderRoster() {
    const section = document.getElementById("rosterSection");
    let html = `<div class="section-label">${state.position.label} — tap up to two to compare</div>`;
    for (const p of state.players) {
      const isSel = state.selected.find(x => x.player === p.player);
      const preview = Object.entries(p.stats).slice(0, 4).map(([k, v]) => `${k} ${v}`).join("  ·  ");
      html += `
        <div class="player-row${isSel ? " selected" : ""}" data-name="${p.player}">
          <div>
            <div class="player-name">${titleCase(p.player)}</div>
            <div class="player-sub">${preview}</div>
          </div>
          ${p.ppa != null ? `<div class="ppa-badge"><div class="ppa-lbl">PPA</div><div class="ppa-val">${p.ppa.toFixed(2)}</div></div>` : ""}
        </div>`;
    }
    section.innerHTML = html;
    section.querySelectorAll(".player-row").forEach(row => {
      row.addEventListener("click", () => toggleSelect(row.dataset.name));
    });
  }

  function toggleSelect(name) {
    const p = state.players.find(x => x.player === name);
    const exists = state.selected.find(x => x.player === name);
    if (exists) {
      state.selected = state.selected.filter(x => x.player !== name);
    } else if (state.selected.length < 2) {
      state.selected.push(p);
    } else {
      state.selected = [state.selected[1], p];
    }
    renderRoster();
    renderTape();
  }

  function renderTape() {
    const section = document.getElementById("tapeSection");
    if (state.selected.length !== 2) { section.innerHTML = ""; return; }
    const [a, b] = state.selected;
    const keys = Array.from(new Set([...Object.keys(a.stats), ...Object.keys(b.stats)]));

    let rows = "";
    for (const key of keys) {
      const av = a.stats[key] ?? 0, bv = b.stats[key] ?? 0;
      const max = Math.max(Math.abs(av), Math.abs(bv), 1);
      rows += `
        <div class="stat-row">
          <div class="stat-labels"><span>${av}</span><span class="mid">${key}</span><span>${bv}</span></div>
          <div class="bar-track">
            <div class="bar-half left"><div class="bar-fill a" style="width:${(Math.abs(av)/max)*100}%"></div></div>
            <div class="bar-half right"><div class="bar-fill b" style="width:${(Math.abs(bv)/max)*100}%"></div></div>
          </div>
        </div>`;
    }

    if (a.ppa != null || b.ppa != null) {
      const av = a.ppa || 0, bv = b.ppa || 0;
      const max = Math.max(Math.abs(av), Math.abs(bv), 0.1);
      rows += `
        <div class="stat-row">
          <div class="stat-labels"><span>${a.ppa != null ? a.ppa.toFixed(3) : "—"}</span><span class="mid">Impact Rating (PPA)</span><span>${b.ppa != null ? b.ppa.toFixed(3) : "—"}</span></div>
          <div class="bar-track">
            <div class="bar-half left"><div class="bar-fill a" style="width:${(Math.abs(av)/max)*100}%"></div></div>
            <div class="bar-half right"><div class="bar-fill b" style="width:${(Math.abs(bv)/max)*100}%"></div></div>
          </div>
        </div>`;
    }

    section.innerHTML = `
      <div class="card">
        <div class="tape-title">Tale of the Tape</div>
        <div class="tape-names"><span class="a">${titleCase(a.player)}</span><span class="b">${titleCase(b.player)}</span></div>
        ${rows}
        <div class="footnote">PPA = Predicted Points Added per play — a better "who actually helped their team win" number than raw yards.</div>
      </div>`;
  }

  document.getElementById("loadBtn").addEventListener("click", loadData);
</script>
</body>
</html>
